<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OneFrame</title>
  <link rel="stylesheet" href="index.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <div class="app-container">
    <!-- 顶部标题栏 -->
    <header class="app-header">
      <h1 class="app-title">🎨 OneFrame</h1>
      <p class="app-subtitle">为照片添加精美边框</p>
    </header>

    <!-- 边框样式图片墙 -->
    <main class="style-gallery">
      <h2 class="section-title">选择边框样式</h2>
      
      <div class="style-grid">
        <!-- 样式卡片 1: 白色下边框 -->
        <div class="style-card" data-style="type-a">
          <div class="style-preview">
            <div class="frame-container">
              <img src="../../examples/A.jpg" alt="示例图片" class="preview-image">
              <div class="photo-footer"></div>
            </div>
          </div>
          <div class="style-info">
            <span class="style-name">白色下边框</span>
            <span class="style-tag">Type A</span>
          </div>
        </div>

        <!-- 样式卡片 2: 黑色下边框 -->
        <div class="style-card" data-style="type-b">
          <div class="style-preview">
            <div class="frame-container style-b">
              <img src="../../examples/B.jpg" alt="示例图片" class="preview-image">
              <div class="photo-footer"></div>
            </div>
          </div>
          <div class="style-info">
            <span class="style-name">黑色下边框</span>
            <span class="style-tag">Type B</span>
          </div>
        </div>

        <!-- 更多样式卡片 -->
        <div class="style-card disabled">
          <div class="style-preview">
            <div class="coming-soon">即将推出</div>
          </div>
          <div class="style-info">
            <span class="style-name">更多样式</span>
            <span class="style-tag">开发中</span>
          </div>
        </div>
      </div>
    </main>

    <!-- 底部操作区 -->
    <footer class="app-footer">
      <p class="footer-hint">💡 点击样式卡片，然后选择要处理的图片</p>
    </footer>
  </div>

  <!-- 编辑器视图 -->
  <div id="editor-view" class="editor-view hidden">
    <!-- 主预览区 -->
    <div class="preview-area">
      <div class="frame-wrapper" id="frameWrapper">
        <img id="userImage" src="" alt="用户图片">
        <div class="photo-footer" id="photoFooter">
          <!-- 边框内容预览 -->
          <div class="border-content" id="borderContent">
            <div class="border-content-inner">
              <!-- Logo - 左侧 2.5% -->
              <div class="border-logo" id="borderLogo"></div>
              <!-- 机型+参数 - 中间区域 -->
              <div class="border-info">
                <div class="border-info-inner">
                  <div class="border-text border-model" id="borderModel"></div>
                  <div class="border-text border-params" id="borderParams"></div>
                </div>
              </div>
              <!-- 焦距 - 52.5% -->
              <div class="border-focal">
                <div class="border-text border-focal-text" id="borderFocal"></div>
              </div>
              <!-- 署名+时间 - 右侧 -->
              <div class="border-right">
                <div class="border-right-inner">
                  <div class="border-text border-signature" id="borderSignature"></div>
                  <div class="border-text" id="borderTime"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 右侧浮动图标按钮 -->
    <div class="float-actions">
      <button class="float-btn" id="btnTemplate" title="换个模板">
        <i class="fas fa-th-large"></i>
        <span>换个模板</span>
      </button>
      <button class="float-btn" id="btnReselect" title="重选照片">
        <i class="fas fa-image"></i>
        <span>重选照片</span>
      </button>
      <button class="float-btn" id="btnEdit" title="编辑">
        <i class="fas fa-sliders-h"></i>
        <span>编辑</span>
      </button>
      <button class="float-btn" id="btnSave" title="保存">
        <i class="fas fa-save"></i>
        <span>保存</span>
      </button>
    </div>

    <!-- 编辑面板 -->
    <div class="edit-panel" id="editPanel">
      <div class="panel-header">
        <button class="panel-close" id="btnClosePanel">←</button>
        <span class="panel-title">图片设置</span>
        <button class="btn-export-top" id="btnExportTop">
          <i class="fas fa-download"></i>
          导出
        </button>
      </div>

      <!-- 比例设置 -->
      <div class="edit-section">
        <div class="section-title"><i class="fas fa-crop"></i> 比例</div>
        <div class="control-group">
          <label>输出比例</label>
          <select id="aspectRatio">
            <option value="original">保持原比例</option>
            <option value="1:1">1:1</option>
            <option value="4:3">4:3</option>
            <option value="3:2">3:2</option>
            <option value="16:9">16:9</option>
          </select>
        </div>
      </div>

      <!-- 边框设置 -->
      <div class="edit-section">
        <div class="section-title"><i class="fas fa-border-all"></i> 边框</div>
        <div class="control-group">
          <label>边框颜色</label>
          <div class="color-preset-group">
            <button class="color-preset white active" data-color="#ffffff">白</button>
            <button class="color-preset black" data-color="#000000">黑</button>
            <input type="color" id="borderColor" value="#ffffff" class="color-input">
          </div>
        </div>
        <div class="control-group">
          <label>边框高度 <span class="value-display" id="borderHeightLabel">12%</span></label>
          <input type="range" id="borderHeight" min="5" max="30" value="12">
        </div>
      </div>

      <!-- Logo 设置 -->
      <div class="edit-section">
        <div class="section-title"><i class="fas fa-camera"></i> Logo</div>
        <div class="control-group">
          <div class="switch-group">
            <label>显示相机 Logo</label>
            <div class="switch active" id="switchLogo"></div>
          </div>
        </div>
        <!-- Logo 网格选择器 -->
        <div class="logo-grid" id="logoGrid"></div>
        <div class="logo-preview" id="logoPreview"></div>
      </div>

      <!-- 设备型号 -->
      <div class="edit-section">
        <div class="section-title"><i class="fas fa-mobile-alt"></i> 设备型号</div>
        <input type="hidden" id="switchModel" class="switch active">
        <div class="control-group">
          <label>设备型号</label>
          <input type="text" id="customModel" placeholder="自动从EXIF读取">
        </div>
      </div>

      <!-- 拍摄参数 -->
      <div class="edit-section">
        <div class="section-title"><i class="fas fa-tachometer-alt"></i> 拍摄参数</div>
        <div class="control-group">
          <div class="switch-group">
            <label>显示拍摄参数</label>
            <div class="switch active" id="switchParams"></div>
          </div>
        </div>
        <!-- 参数 2x2 网格 - 单位在后置 -->
        <div class="params-grid">
          <div class="param-item">
            <input type="text" id="fNumber" placeholder="—">
            <label>f/</label>
          </div>
          <div class="param-item">
            <input type="text" id="exposureTime" placeholder="—">
            <label>s</label>
          </div>
          <div class="param-item">
            <input type="text" id="focalLength" placeholder="—">
            <label>mm</label>
          </div>
          <div class="param-item">
            <label>ISO</label>
            <input type="text" id="iso" placeholder="—">
          </div>
        </div>
      </div>

      <!-- 时间设置 -->
      <div class="edit-section">
        <div class="section-title"><i class="fas fa-clock"></i> 时间</div>
        <div class="control-group">
          <div class="switch-group">
            <label>显示拍摄时间</label>
            <div class="switch active" id="switchTime"></div>
          </div>
        </div>
        <div class="control-group">
          <label>拍摄时间</label>
          <input type="datetime-local" id="dateTime">
        </div>
      </div>

      <!-- 署名设置 -->
      <div class="edit-section">
        <div class="section-title"><i class="fas fa-pen"></i> 署名</div>
        <input type="hidden" id="switchSignature" class="switch">
        <div class="control-group">
          <label>署名文字</label>
          <input type="text" id="signatureText" placeholder="如: Photo by John">
        </div>
      </div>

      <!-- 导出按钮 -->
      <div class="panel-footer">
        <button class="btn-primary" id="btnExport">
          <i class="fas fa-download"></i>
          导出图片
        </button>
      </div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
